{% extends "base_parent.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block template %}
<section class="p-5 mt-5 container">
  <div class="container-fluid h-custom">
    <div class="row d-flex justify-content-center align-items-center h-100">
        
      <div class="col-md-9 col-lg-6 col-xl-5">
        <img src="{% static 'images/loginParent.png' %}" alt="Login" style="width: 30rem;">
      </div>

      <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
        <form method="post">
            {% csrf_token %}
            <h3 class="fw-bold mb-4">Login Parent</h3>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <div class="form-outline mb-4">
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required />
                <label class="form-label">Username</label>
            </div>

            <div class="form-outline mb-3">
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required />
                <label class="form-label">Password</label>
            </div>

            <div class="text-center text-lg-start mt-4 pt-2">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </div>
        </form>

            {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger mt-3">{{ message }}</div>
            {% endfor %}
            {% endif %}
      </div>
    </div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

{% endblock %}
