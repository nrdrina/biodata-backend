{% extends "base.html" %}

{% block title %}upload file{% endblock %}

{% block template %}
<h2>Upload a File</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
    <a href="{% url 'file_list' %}">View Uploaded Files</a>
{% endblock %}
