{% extends "base.html" %}

{% block title %}Uploaded Files{% endblock %}

{% block template %}
<h2>Uploaded Files</h2>
<ul>
    {% for document in documents %}
    <li><a href="{{ document.uploaded_file.url }}">{{ document.title }}</a></li>
    {% endfor %}
</ul>
<a href="{% url 'upload_file' %}">Upload Another File</a>
{% endblock %}
